# Foreground process (Docker)
listen=YES
listen_ipv6=NO
background=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Chroot FTP user to home (/var/www/html — WordPress volume)
chroot_local_user=YES
allow_writeable_chroot=YES
# Allow nologin users (FTP-only account)
check_shell=NO

xferlog_enable=YES
xferlog_file=/var/log/vsftpd/vsftpd.log

# listen_port, pasv_* appended at container start (vsftpd has no include= directive)

# Container-friendly defaults
seccomp_sandbox=NO
port_enable=YES
connect_from_port_20=NO
