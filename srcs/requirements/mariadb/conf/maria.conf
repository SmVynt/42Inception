# MariaDB — Inception / WordPress in Docker

[mysqld]
user                    = mysql
pid_file                = /run/mysqld/mysqld.pid
socket                  = /run/mysqld/mysqld.sock
port                    = 3306
datadir                 = /var/lib/mysql
tmpdir                  = /tmp

# Other containers (wordpress) connect via the compose network — not localhost-only
bind-address            = 0.0.0.0
skip-name-resolve        = ON

character-set-server    = utf8mb4
collation-server        = utf8mb4_unicode_ci

# WordPress: uploads, imports, long queries
max_allowed_packet      = 64M
max_connections         = 100

# ~256M fits typical small VMs
innodb_buffer_pool_size = 256M

# Single-node stack: no replication binlog (MariaDB 10.6+)
disable_log_bin         = ON

# Lives on the persistent volume; no extra directory needed in the image
log_error               = /var/lib/mysql/error.log

[client]
socket                  = /run/mysqld/mysqld.sock
default-character-set   = utf8mb4
