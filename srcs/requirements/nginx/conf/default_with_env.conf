server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name $DOMAIN_NAME www.$DOMAIN_NAME;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    # Docker DNS; ipv6=off so fastcgi_pass hits PHP-FPM over IPv4 (FPM listens on 0.0.0.0:9000).
    resolver 127.0.0.11 valid=10s ipv6=off;

    index index.html index.php;
    root /var/www/html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        set $php_upstream wordpress:9000;
        fastcgi_pass $php_upstream;
        include fastcgi.conf;
    }
}

# Bonus: Adminer
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name adminer.$DOMAIN_NAME;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $adminer_upstream adminer:8080;

    location / {
        proxy_pass http://$adminer_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}


# Bonus: Web
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name web.$DOMAIN_NAME;

    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    location / {
    }
}